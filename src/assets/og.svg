<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1120" />
      <stop offset="1" stop-color="#0a0f1b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.05" r="0.7">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.38" />
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0" />
    </radialGradient>
    <clipPath id="avatarClip">
      <circle cx="958" cy="312" r="104" />
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- terminal window -->
  <rect x="80" y="110" width="1040" height="410" rx="20" fill="#111a2b" stroke="#22304a" stroke-width="1.5" />

  <!-- title bar -->
  <circle cx="122" cy="150" r="8" fill="#ff5f57" />
  <circle cx="148" cy="150" r="8" fill="#febc2e" />
  <circle cx="174" cy="150" r="8" fill="#28c840" />
  <text x="212" y="158" font-family="Menlo, monospace" font-size="22" fill="#6b7a90">tom@tomdoes.tech ~</text>
  <line x1="80" y1="186" x2="1120" y2="186" stroke="#22304a" stroke-width="1.5" />

  <!-- avatar -->
  <image x="854" y="208" width="208" height="208" href="avatar.jpg" xlink:href="avatar.jpg" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice" />
  <circle cx="958" cy="312" r="104" fill="none" stroke="#2dd4bf" stroke-width="4" opacity="0.85" />

  <!-- name -->
  <text x="120" y="300" font-family="Menlo, monospace" font-size="76" font-weight="700" fill="#eef2f7"><tspan fill="#2dd4bf">&gt; </tspan>Tom Nagle</text>

  <!-- role -->
  <text x="124" y="356" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#9fb0c0">Senior Software Engineer · Sunshine Coast, QLD</text>

  <!-- tagline -->
  <text x="124" y="430" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#cdd7e4">Building backends, data pipelines, and products.</text>

  <!-- footer -->
  <text x="120" y="566" font-family="Menlo, monospace" font-size="24" fill="#2dd4bf">tomdoes.tech</text>
  <text x="1080" y="566" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#6b7a90">github.com/tomanagle</text>
</svg>
